<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تغيير كلمة المرور</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>
    .container { max-width: 520px; }
  </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">تغيير كلمة المرور</span>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('home') }}">رجوع</a>
  </div>
</nav>

<div class="container py-4">
  {% with msgs=get_flashed_messages(with_categories=true) %}
    {% for c,m in msgs %}
      <div class="alert alert-{{c}}">{{m}}</div>
    {% endfor %}
  {% endwith %}

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST" class="row g-3">
        <div class="col-12">
          <label class="form-label">كلمة المرور الحالية</label>
          <input type="password" name="current_password" class="form-control" autocomplete="current-password" required>
        </div>
        <div class="col-12">
          <label class="form-label">كلمة المرور الجديدة</label>
          <input type="password" name="new_password" class="form-control" autocomplete="new-password" minlength="4" required>
        </div>
        <div class="col-12">
          <label class="form-label">تأكيد كلمة المرور الجديدة</label>
          <input type="password" name="confirm_password" class="form-control" autocomplete="new-password" minlength="4" required>
        </div>
        <div class="col-12">
          <button class="btn btn-primary w-100">حفظ كلمة المرور</button>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
